{% extends "base.html" %}
{% block title %}Log In | Loan Eligibility Prediction System{% endblock %}

{% block content %}
<section class="leps-auth-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">

                <div class="auth-card">
                    <div class="auth-card-header">
                        <h2 class="auth-title">Log In</h2>
                        <p class="auth-subtitle">Enter your credentials to continue.</p>
                    </div>

                    <form method="POST" action="{{ url_for('main.login') }}" novalidate>
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input
                                type="email"
                                class="form-control leps-input"
                                id="email"
                                name="email"
                                value="{{ email or '' }}"
                                placeholder="Enter your email address"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input
                                type="password"
                                class="form-control leps-input"
                                id="password"
                                name="password"
                                placeholder="Enter your password"
                                required
                            >
                        </div>

                        <div class="mb-4 d-flex align-items-center">
                            <input
                                type="checkbox"
                                class="form-check-input me-2"
                                id="remember"
                                name="remember"
                            >
                            <label for="remember" class="form-check-label remember-label">
                                Keep me logged in
                            </label>
                        </div>

                        <button type="submit" class="btn btn-navy w-100">Log In</button>

                        <p class="auth-switch-text mt-3 text-center">
                            Do not have an account?
                            <a href="{{ url_for('main.register') }}" class="auth-link">Create one here.</a>
                        </p>
                    </form>
                </div>

            </div>
        </div>
    </div>
</section>
{% endblock %}
