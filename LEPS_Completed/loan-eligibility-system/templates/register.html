{% extends "base.html" %}
{% block title %}Create Account | Loan Eligibility Prediction System{% endblock %}

{% block content %}
<section class="leps-auth-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">

                <div class="auth-card">
                    <div class="auth-card-header">
                        <h2 class="auth-title">Create an Account</h2>
                        <p class="auth-subtitle">Fill in your details to get started.</p>
                    </div>

                    <form method="POST" action="{{ url_for('main.register') }}" novalidate>
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <div class="mb-3">
                            <label for="full_name" class="form-label">Full Name</label>
                            <input
                                type="text"
                                class="form-control leps-input"
                                id="full_name"
                                name="full_name"
                                value="{{ full_name or '' }}"
                                placeholder="Enter your full name"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input
                                type="email"
                                class="form-control leps-input"
                                id="email"
                                name="email"
                                value="{{ email or '' }}"
                                placeholder="Enter your email address"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label for="phone_number" class="form-label">Phone Number</label>
                            <input
                                type="tel"
                                class="form-control leps-input"
                                id="phone_number"
                                name="phone_number"
                                value="{{ phone_number or '' }}"
                                placeholder="e.g. 08012345678"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input
                                type="password"
                                class="form-control leps-input"
                                id="password"
                                name="password"
                                placeholder="Minimum 8 characters"
                                required
                            >
                        </div>

                        <div class="mb-4">
                            <label for="confirm_password" class="form-label">Confirm Password</label>
                            <input
                                type="password"
                                class="form-control leps-input"
                                id="confirm_password"
                                name="confirm_password"
                                placeholder="Re-enter your password"
                                required
                            >
                        </div>

                        <button type="submit" class="btn btn-navy w-100">Create Account</button>

                        <p class="auth-switch-text mt-3 text-center">
                            Already have an account?
                            <a href="{{ url_for('main.login') }}" class="auth-link">Log in here.</a>
                        </p>
                    </form>
                </div>

            </div>
        </div>
    </div>
</section>
{% endblock %}
